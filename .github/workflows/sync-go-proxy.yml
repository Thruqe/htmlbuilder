name: Sync to Go Proxy

on:
  push:
    branches:
      - master

jobs:
  update-proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Force Go Proxy to index latest commit
        run: |
          GOPROXY=https://proxy.golang.org go list -m github.com/Thruqe/htmlbuilder@master
